name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test-v:
    name: V Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install V
        uses: vlang/setup-v@v1.4

      - name: Get V version
        run: v --version

      - name: Build gaslsp
        run: |
          cd src
          v -o gaslsp .

      - name: Run integration tests
        run: |
          mkdir -p ~/.local/bin
          cp src/gaslsp ~/.local/bin/gaslsp
          cp -r src/tables ~/.local/bin/
chmod +x tests/integration.sh tests/test_diags.sh
          tests/integration.sh

  test-diags:
    name: Diagnostic Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install V
        uses: vlang/setup-v@v1.4

      - name: Build gaslsp
        run: |
          cd src
          v -o gaslsp .

      - name: Install and test diagnostics
        run: |
          mkdir -p ~/.local/bin
          cp src/gaslsp ~/.local/bin/gaslsp
          cp -r src/tables ~/.local/bin/
          chmod +x tests/test_diags.sh
          tests/test_diags.sh